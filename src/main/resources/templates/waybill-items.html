<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>运单明细</title>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<header class="topbar">
    <div class="brand">智慧跨境物流供应链管理系统</div>
    <nav class="nav">
        <a href="/">BI看板</a>
        <a href="/master/regions">基础数据</a>
        <a href="/waybills">运单管理</a>
    </nav>
</header>
<main class="container">
    <h1 class="page-title" th:text="'运单 #' + ${waybillId} + ' 明细'">运单明细</h1>
    <section class="panel">
        <table>
            <thead><tr><th>明细编号</th><th>商品</th><th>仓库</th><th>数量</th><th>基础运费</th><th>加急费率</th><th>税率</th><th>行运费</th></tr></thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.itemid}">1</td>
                <td th:text="${item.goods_name}">商品</td>
                <td th:text="${item.warehouse_name}">仓库</td>
                <td th:text="${item.quantity}">0</td>
                <td th:text="${item.base_freight}">0</td>
                <td th:text="${item.premium_rate}">0</td>
                <td th:text="${item.tax}">0</td>
                <td th:text="${item.line_freight}">0</td>
            </tr>
            </tbody>
        </table>
        <p><a class="button secondary" href="/waybills">返回运单列表</a></p>
    </section>
</main>
</body>
</html>
